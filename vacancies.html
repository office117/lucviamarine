<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vacancies</title>

<style>
body{
margin:0;
font-family:Arial;
background:#061626;
color:white;
}

nav{
text-align:center;
padding:20px;
background:#081c33;
}

nav a{
color:#7fd3ff;
margin:10px;
text-decoration:none;
}

.search{
text-align:center;
margin:20px;
}

input, select{
padding:10px;
width:200px;
margin:5px;
}

.vacancy{
background:#0a2440;
margin:10px auto;
padding:15px;
width:80%;
border-left:4px solid #2aa9ff;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="vacancies.html">Vacancies</a>
<a href="apply.html">Apply CV</a>
</nav>

<div class="search">
<input id="search" onkeyup="filter()" placeholder="Search position...">

<select id="filter" onchange="filter()">
<option value="all">All</option>
<option value="deck">Deck</option>
<option value="engine">Engine</option>
<option value="officer">Officer</option>
</select>
</div>

<div id="list">

<div class="vacancy engine">
ETO - Chemical Tanker | 6000 USD
</div>

<div class="vacancy officer">
3rd Officer - Bulk Carrier | 3500 USD
</div>

<div class="vacancy deck">
AB Seaman - Container Vessel | 2000 USD
</div>

</div>

<script>
function filter(){
let input=document.getElementById("search").value.toLowerCase();
let filter=document.getElementById("filter").value;
let items=document.querySelectorAll(".vacancy");

items.forEach(el=>{
let text=el.innerText.toLowerCase();
let matchText=text.includes(input);
let matchFilter=filter==="all"||el.classList.contains(filter);

el.style.display=(matchText&&matchFilter)?"block":"none";
});
}
</script>

</body>
</html>
