<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Apply CV - Lucvia Marine</title>

<style>
body {
  background:#071524;
  color:white;
  font-family:Arial;
}

.container {
  max-width:600px;
  margin:auto;
  padding:40px;
}

input, textarea {
  width:100%;
  margin:10px 0;
  padding:12px;
  background:#0d2236;
  border:1px solid gold;
  color:white;
}

button {
  background:gold;
  border:none;
  padding:12px;
  width:100%;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1 style="color:gold;">Apply for Job</h1>

<form action="https://formsubmit.co/office@lucviamarine.com" method="POST">

  <input type="text" name="Name" placeholder="Full Name" required>
  <input type="text" name="Position" placeholder="Desired Position" required>
  <input type="email" name="Email" placeholder="Email" required>
  <input type="text" name="Phone" placeholder="Phone / WhatsApp">

  <textarea name="Experience" placeholder="Experience / Last vessel"></textarea>

  <button type="submit">Send CV</button>

</form>

</div>

</body>
</html>
