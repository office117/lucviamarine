<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Apply CV</title>

<style>
body{
background:#061626;
color:white;
font-family:Arial;
}

.container{
max-width:500px;
margin:auto;
padding:40px;
}

input, textarea{
width:100%;
padding:12px;
margin:8px 0;
background:#0a2440;
border:1px solid #2aa9ff;
color:white;
}

button{
width:100%;
padding:12px;
background:#2aa9ff;
border:none;
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Apply for Position</h2>

<form action="https://formsubmit.co/office@lucviamarine.com" method="POST">

<input name="name" placeholder="Full Name" required>
<input name="position" placeholder="Position" required>
<input name="email" placeholder="Email" required>
<input name="phone" placeholder="Phone">
<textarea name="experience" placeholder="Experience"></textarea>

<button type="submit">Send CV</button>

</form>

</div>

</body>
</html>
